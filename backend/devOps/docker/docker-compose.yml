services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-liquidflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liquidflow_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-liquidflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-liquidflow} -d ${POSTGRES_DB:-liquidflow}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - flowfi-network

  backend:
    build:
      context: ../../
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://liquidflow:liquidflow_dev_password@postgres:5432/liquidflow}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').connect(3001,'localhost',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - flowfi-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - flowfi-network
    restart: unless-stopped

networks:
  flowfi-network:
    driver: bridge
volumes:
  postgres_data:
